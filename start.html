<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Wave - Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a3c2a, #2e8b57);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .portal-container {
            background: white;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            color: #2e8b57;
            margin-bottom: 10px;
        }
        .portal-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .customer-btn, .admin-btn {
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .customer-btn {
            background: #2e8b57;
            color: white;
        }
        .admin-btn {
            background: #ff6b6b;
            color: white;
        }
        .customer-btn:hover, .admin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .note {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <img src="Fresh logo.jpg" alt="Fresh Wave Logo" class="logo" onerror="this.src='https://placehold.co/100x100/2e8b57/white?text=FW'">
        <h1>Fresh Wave Portal</h1>
        <p>Choose where you want to go</p>
        
        <div class="portal-buttons">
            <a href="index.html" class="customer-btn">
                <i class="fas fa-shopping-cart"></i> Customer Shop
            </a>
            <a href="admin-login.html" class="admin-btn">
                <i class="fas fa-chalkboard-user"></i> Admin Panel
            </a>
        </div>
        
        <div class="note">
            <i class="fas fa-shield-alt"></i> Admin area requires login credentials
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>
</html>
